name: Submission Gate

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: submission-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  metagraphed-submission-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Capture changed files
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            git fetch origin "$BASE_REF"
            git diff --name-only "origin/$BASE_REF"...HEAD > changed-files.txt
          fi

      - name: Run public submission preflight
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: npm run submission:pr -- --changed-files changed-files.txt --out submission-report.json

      - name: Show public preflight report
        run: |
          npm run submission:comment -- --report submission-report.json --out submission-comment.md
          cat submission-comment.md >> "$GITHUB_STEP_SUMMARY"
